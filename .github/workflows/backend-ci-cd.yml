name: Backend CI/CD (Cloud Run)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: "Environment to deploy (staging or production)"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  PROJECT_ID: <YOUR_GCP_PROJECT_ID>
  REGION: us-central1
  ARTIFACT_REPO: <YOUR_ARTIFACT_REPO>
  SERVICE_STAGING: <YOUR_APP>-backend-staging
  SERVICE_PROD: <YOUR_APP>-backend-prod

jobs:
  # Runs on every push to main: installs deps and checks for syntax errors.
  # Does NOT deploy. Deployment is a separate manual step below.
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Check syntax
        run: python -m py_compile backend/server.py && echo "Syntax OK"

  # Runs only when manually triggered via workflow_dispatch.
  # Requires the ci job to pass first.
  #
  # Required GitHub Secrets:
  #   GCP_SA_KEY_JSON              – Service account JSON key with roles:
  #                                  Cloud Build Editor, Artifact Registry Writer,
  #                                  Cloud Run Admin, Service Account User
  #   GCP_RUN_SERVICE_ACCOUNT_EMAIL – e.g. <app>-cloud-run@<project-id>.iam.gserviceaccount.com
  #
  # Required GitHub Variables (not secrets):
  #   BACKEND_URL_STAGING  – set after first staging deploy (Cloud Run URL)
  #   BACKEND_URL_PROD     – set after first production deploy (Cloud Run URL)
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/backend:${{ github.sha }}"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Deploy to Cloud Run
        run: |
          DEPLOY_ENV="${{ github.event.inputs.deploy_environment }}"
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/backend:${{ github.sha }}"

          if [ "$DEPLOY_ENV" = "production" ]; then
            SERVICE_NAME="${{ env.SERVICE_PROD }}"
            ENV_SECRETS="MONGO_URL=MONGO_URI_PROD:latest,PERPLEXITY_API_KEY=PERPLEXITY_API_KEY:latest,GOOGLE_AI_STUDIO_KEY=GOOGLE_AI_STUDIO_KEY:latest,SHOFO_API_KEY=SHOFO_API_KEY:latest,FOREPLAY_API_KEY=FOREPLAY_API_KEY:latest"
            DB_NAME="${{ vars.DB_NAME_PROD }}"
          else
            SERVICE_NAME="${{ env.SERVICE_STAGING }}"
            ENV_SECRETS="MONGO_URL=MONGO_URI_STAGING:latest,PERPLEXITY_API_KEY=PERPLEXITY_API_KEY:latest,GOOGLE_AI_STUDIO_KEY=GOOGLE_AI_STUDIO_KEY:latest,SHOFO_API_KEY=SHOFO_API_KEY:latest,FOREPLAY_API_KEY=FOREPLAY_API_KEY:latest"
            DB_NAME="${{ vars.DB_NAME_STAGING }}"
          fi

          echo "Deploying $IMAGE_URI → $SERVICE_NAME ($DEPLOY_ENV)"

          gcloud run deploy "$SERVICE_NAME" \
            --image="$IMAGE_URI" \
            --region="${{ env.REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --service-account="${{ secrets.GCP_RUN_SERVICE_ACCOUNT_EMAIL }}" \
            --set-secrets="${ENV_SECRETS}" \
            --set-env-vars="DB_NAME=${DB_NAME}"
